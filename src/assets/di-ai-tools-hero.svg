<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Interface box (left) -->
  <g filter="url(#glow)">
    <rect x="80" y="160" width="340" height="310" rx="16" fill="#1e293b" stroke="url(#accent3)" stroke-width="2"/>
  </g>
  <text x="100" y="200" font-family="monospace" font-size="14" fill="#10b981" font-weight="bold">[Tool]</text>
  <text x="100" y="224" font-family="monospace" font-size="13" fill="#94a3b8">interface</text>
  <text x="185" y="224" font-family="monospace" font-size="13" fill="#e2e8f0" font-weight="bold">IOrderService</text>
  <line x1="100" y1="240" x2="400" y2="240" stroke="#334155" stroke-width="1"/>
  <text x="110" y="268" font-family="monospace" font-size="11" fill="#8b5cf6">[Description]</text>
  <text x="110" y="288" font-family="monospace" font-size="11" fill="#cbd5e1">PlaceOrderAsync()</text>
  <text x="110" y="318" font-family="monospace" font-size="11" fill="#8b5cf6">[Description]</text>
  <text x="110" y="338" font-family="monospace" font-size="11" fill="#cbd5e1">CancelOrderAsync()</text>
  <text x="110" y="368" font-family="monospace" font-size="11" fill="#475569">GetAuditLogAsync()</text>
  <text x="110" y="388" font-family="monospace" font-size="11" fill="#334155">// no [Description] = skipped</text>

  <!-- Arrow -->
  <g filter="url(#softGlow)">
    <line x1="440" y1="315" x2="540" y2="315" stroke="url(#accent1)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="540,305 560,315 540,325" fill="url(#accent1)"/>
  </g>
  <text x="460" y="295" font-family="sans-serif" font-size="12" fill="#06b6d4" font-weight="bold">SOURCE GEN</text>

  <!-- Generated AITool boxes (right) -->
  <g filter="url(#glow)">
    <rect x="580" y="130" width="520" height="130" rx="12" fill="#1e293b" stroke="url(#accent2)" stroke-width="2"/>
  </g>
  <text x="600" y="162" font-family="monospace" font-size="12" fill="#ec4899">class</text>
  <text x="640" y="162" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">IOrderServicePlaceOrderAsyncAITool</text>
  <text x="610" y="184" font-family="monospace" font-size="11" fill="#94a3b8">: AIFunction</text>
  <text x="610" y="210" font-family="monospace" font-size="10" fill="#06b6d4">Guid CustomerId</text>
  <text x="610" y="228" font-family="monospace" font-size="10" fill="#06b6d4">string Sku</text>
  <text x="610" y="246" font-family="monospace" font-size="10" fill="#06b6d4">int Quantity</text>
  <text x="820" y="210" font-family="monospace" font-size="10" fill="#475569">GetGuid()</text>
  <text x="820" y="228" font-family="monospace" font-size="10" fill="#475569">GetString()</text>
  <text x="820" y="246" font-family="monospace" font-size="10" fill="#475569">GetInt32()</text>

  <g filter="url(#glow)">
    <rect x="580" y="280" width="520" height="100" rx="12" fill="#1e293b" stroke="url(#accent2)" stroke-width="2"/>
  </g>
  <text x="600" y="312" font-family="monospace" font-size="12" fill="#ec4899">class</text>
  <text x="640" y="312" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">IOrderServiceCancelOrderAsyncAITool</text>
  <text x="610" y="334" font-family="monospace" font-size="11" fill="#94a3b8">: AIFunction</text>
  <text x="610" y="358" font-family="monospace" font-size="10" fill="#06b6d4">Guid OrderId</text>
  <text x="610" y="370" font-family="monospace" font-size="10" fill="#06b6d4">string Reason</text>
  <text x="820" y="358" font-family="monospace" font-size="10" fill="#475569">GetGuid()</text>
  <text x="820" y="370" font-family="monospace" font-size="10" fill="#475569">GetString()</text>

  <!-- Registration box -->
  <g filter="url(#glow)">
    <rect x="580" y="400" width="520" height="80" rx="12" fill="#1e293b" stroke="url(#accent3)" stroke-width="2"/>
  </g>
  <text x="600" y="430" font-family="monospace" font-size="12" fill="#10b981">services</text>
  <text x="668" y="430" font-family="monospace" font-size="12" fill="#e2e8f0">.AddGeneratedAITools();</text>
  <text x="610" y="458" font-family="monospace" font-size="10" fill="#475569">// registers all tools as Transient&lt;AITool&gt;</text>

  <!-- Title -->
  <text x="600" y="560" font-family="sans-serif" font-size="36" fill="#e2e8f0" font-weight="bold" text-anchor="middle">Shiny DI 3.0 — AI Tool Generation</text>
  <text x="600" y="590" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Interfaces become AI tools at compile time. AOT-safe. Zero boilerplate.</text>
</svg>
